key: beam_bending_stress
taxonomy:
  category: structures
name: Beam Bending Stress
source: "Roark's Formulas for Stress and Strain"
display:
  latex: '\sigma_b = \frac{M c}{I}'
variables:
  sigma_b: { name: Bending stress, symbol: '\sigma_b', dimension: stress }
  M: { name: Bending moment, dimension: moment }
  c: { name: Distance to outer fiber, dimension: length }
  I: { name: Area moment of inertia, dimension: area_moment_of_inertia }
residual: "sigma_b - (M * c / I)"
solve:
  explicit_forms:
    sigma_b: M * c / I
    M: sigma_b * I / c
    c: sigma_b * I / M
    I: M * c / sigma_b
  numerical:
    unsupported_targets: [sigma_b, M, c, I]
assumptions:
  - Linear elastic beam bending with small strains.
tests:
  - full_state:
      sigma_b: "50 MPa"
      M: "5000 N*m"
      c: "0.05 m"
      I: "5e-6 m4"