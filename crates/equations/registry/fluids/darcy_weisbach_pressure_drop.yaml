key: darcy_weisbach_pressure_drop
taxonomy:
  category: fluids
name: Darcy-Weisbach Pressure Drop
source: "Fox, McDonald, and Pritchard, Introduction to Fluid Mechanics"
display:
  latex: '\Delta p = f \frac{L}{D} \frac{\rho V^2}{2}'
variables:
  delta_p: { name: Pressure drop, symbol: '\Delta p', dimension: pressure }
  f: { name: Darcy friction factor, dimension: friction_factor }
  L: { name: Pipe length, dimension: length }
  D: { name: Pipe diameter, dimension: length }
  rho: { name: Fluid density, symbol: '\rho', dimension: density }
  V: { name: Mean velocity, dimension: velocity }
residual: "delta_p - (f * (L / D) * (rho * V^2 / 2))"
solve:
  explicit_forms:
    delta_p: f * (L / D) * (rho * V^2 / 2)
    f: delta_p / ((L / D) * (rho * V^2 / 2))
    L: delta_p * D / (f * (rho * V^2 / 2))
    D: f * L * (rho * V^2 / 2) / delta_p
    rho: 2 * delta_p / (f * (L / D) * V^2)
    V: sqrt((2 * delta_p) / (f * (L / D) * rho))
  numerical:
    unsupported_targets: [delta_p, f, L, D, rho, V]
assumptions:
  - Fully developed internal flow in a constant-diameter conduit.
tests:
  - full_state:
      delta_p: "9000 Pa"
      f: 0.02
      L: "10 m"
      D: "0.1 m"
      rho: "1000 kg/m3"
      V: "3 m/s"