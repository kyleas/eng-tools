key: normal_shock_stagnation_pressure_ratio
taxonomy:
  category: compressible
name: Normal Shock Stagnation Pressure Ratio
source: "Anderson, Modern Compressible Flow: With Historical Perspective"
display:
  latex: '\frac{p_{02}}{p_{01}} = \left(\frac{(\gamma+1)M_1^2}{(\gamma-1)M_1^2+2}\right)^{\gamma/(\gamma-1)}\left(\frac{\gamma+1}{2\gamma M_1^2-(\gamma-1)}\right)^{1/(\gamma-1)}'
  unicode: "p02_p01 = (((gamma+1)*M1^2)/(((gamma-1)*M1^2)+2))^(gamma/(gamma-1)) * ((gamma+1)/(2*gamma*M1^2 - (gamma-1)))^(1/(gamma-1))"
  ascii: "p02_p01 = (((gamma+1)*M1^2)/(((gamma-1)*M1^2)+2))^(gamma/(gamma-1)) * ((gamma+1)/(2*gamma*M1^2 - (gamma-1)))^(1/(gamma-1))"
  description: Stagnation pressure ratio across a normal shock.
variables:
  p02_p01:
    name: Stagnation pressure ratio
    symbol: '\frac{p_{02}}{p_{01}}'
    dimension: ratio
    constraints:
      positive: true
      max: 1.0
  M1:
    name: Upstream Mach number
    symbol: 'M_1'
    dimension: mach
    constraints:
      min: 1.0
  gamma:
    name: Specific heat ratio
    symbol: '\gamma'
    dimension: dimensionless
    constraints:
      min: 1.01
residual: p02_p01 - (pow((((gamma + 1) * M1^2) / (((gamma - 1) * M1^2) + 2)), gamma / (gamma - 1)) * pow(((gamma + 1) / ((2 * gamma * M1^2) - (gamma - 1))), 1 / (gamma - 1)))
solve:
  explicit_forms:
    p02_p01: pow((((gamma + 1) * M1^2) / (((gamma - 1) * M1^2) + 2)), gamma / (gamma - 1)) * pow(((gamma + 1) / ((2 * gamma * M1^2) - (gamma - 1))), 1 / (gamma - 1))
  numerical:
    unsupported_targets: [gamma]
    solver: bisection
    initial_guess: 2.0
    bracket: [1.000001, 20.0]
    tolerance_abs: 1e-12
    tolerance_rel: 1e-10
    max_iter: 400
assumptions:
  - One-dimensional, steady, adiabatic normal shock.
  - Calorically perfect gas with constant gamma.
tests:
  units_policy: auto_convert_to_si
  relation_tolerance:
    abs: 1e-11
    rel: 1e-9
  cases:
    - id: m1_2
      full_state:
        M1: 2.0
        gamma: 1.4
        p02_p01: 0.7208738614847455
      verify:
        residual_zero: true
        solve_targets:
          - target: p02_p01
            methods: [explicit]
          - target: M1
            methods: [numerical]
