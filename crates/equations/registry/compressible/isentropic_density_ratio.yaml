key: isentropic_density_ratio
taxonomy:
  category: compressible
name: Isentropic Density Ratio
source: "Anderson, Modern Compressible Flow: With Historical Perspective"
display:
  latex: '\frac{\rho}{\rho_0} = \left(1+\frac{\gamma-1}{2}M^2\right)^{-1/(\gamma-1)}'
variables:
  rho_rho0: { name: Static-to-stagnation density ratio, symbol: '\frac{\rho}{\rho_0}', dimension: ratio }
  M: { name: Mach number, dimension: mach }
  gamma: { name: Specific heat ratio, symbol: '\gamma', dimension: dimensionless, constraints: { min: 1.01 } }
residual: "rho_rho0 - pow(1 + ((gamma - 1) / 2) * M^2, -1 / (gamma - 1))"
solve:
  explicit_forms:
    rho_rho0: pow(1 + ((gamma - 1) / 2) * M^2, -1 / (gamma - 1))
  numerical:
    unsupported_targets: [gamma]
assumptions:
  - Isentropic perfect-gas flow with constant gamma.
tests:
  - full_state:
      rho_rho0: 0.23004814583331162
      M: 2.0
      gamma: 1.4
