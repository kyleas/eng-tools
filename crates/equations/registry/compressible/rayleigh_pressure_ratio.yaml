key: rayleigh_pressure_ratio
taxonomy:
  category: compressible
name: Rayleigh Pressure Ratio
source: "Anderson, Modern Compressible Flow: With Historical Perspective"
display:
  latex: '\frac{p}{p^*} = \frac{\gamma+1}{1+\gamma M^2}'
  unicode: "p/p* = (gamma + 1) / (1 + gamma*M^2)"
  ascii: "p_pstar = (gamma + 1) / (1 + gamma*M^2)"
  description: Rayleigh-flow static pressure ratio relative to sonic star state.
variables:
  p_pstar:
    name: Pressure ratio to star state
    symbol: '\frac{p}{p^*}'
    dimension: ratio
    constraints:
      positive: true
  M:
    name: Mach number
    symbol: 'M'
    dimension: mach
    constraints:
      positive: true
      nonzero: true
  gamma:
    name: Specific heat ratio
    symbol: '\gamma'
    dimension: dimensionless
    constraints:
      min: 1.01
residual: p_pstar - ((gamma + 1) / (1 + gamma * M^2))
solve:
  explicit_forms:
    p_pstar: (gamma + 1) / (1 + gamma * M^2)
  numerical:
    unsupported_targets: [gamma]
    solver: bisection
    initial_guess: 1.2
    bracket: [0.01, 20.0]
    tolerance_abs: 1e-12
    tolerance_rel: 1e-10
    max_iter: 400
assumptions:
  - One-dimensional, steady, constant-area, frictionless flow with heat transfer.
  - Calorically perfect gas with constant gamma.
tests:
  units_policy: auto_convert_to_si
  relation_tolerance:
    abs: 1e-11
    rel: 1e-9
  cases:
    - id: m_0_5
      full_state:
        gamma: 1.4
        M: 0.5
        p_pstar: 1.7777777777777777
      verify:
        residual_zero: true
        solve_targets:
          - target: p_pstar
            methods: [explicit]
          - target: M
            methods: [numerical]
    - id: m_2_0
      full_state:
        gamma: 1.4
        M: 2.0
        p_pstar: 0.36363636363636365
      verify:
        residual_zero: true
        solve_targets:
          - target: p_pstar
            methods: [explicit]
          - target: M
            methods: [numerical]
