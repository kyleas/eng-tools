key: fanno_velocity_ratio
taxonomy:
  category: compressible
name: Fanno Velocity Ratio
source: "Anderson, Modern Compressible Flow: With Historical Perspective"
display:
  latex: '\frac{V}{V^*} = M\sqrt{\frac{\frac{\gamma+1}{2}}{1+\frac{\gamma-1}{2}M^2}}'
  unicode: "V/V* = M * sqrt(((gamma+1)/2) / (1 + ((gamma-1)/2)*M^2))"
  ascii: "v_vstar = M * sqrt(((gamma+1)/2) / (1 + ((gamma-1)/2)*M^2))"
  description: Fanno-flow velocity ratio relative to sonic star state.
variables:
  v_vstar:
    name: Velocity ratio to star state
    symbol: '\frac{V}{V^*}'
    dimension: ratio
    constraints:
      positive: true
  M:
    name: Mach number
    symbol: 'M'
    dimension: mach
    constraints:
      positive: true
      nonzero: true
  gamma:
    name: Specific heat ratio
    symbol: '\gamma'
    dimension: dimensionless
    constraints:
      min: 1.01
residual: v_vstar - (M * sqrt(((gamma + 1) / 2) / (1 + ((gamma - 1) / 2) * M^2)))
solve:
  explicit_forms:
    v_vstar: M * sqrt(((gamma + 1) / 2) / (1 + ((gamma - 1) / 2) * M^2))
  numerical:
    unsupported_targets: [gamma]
    solver: bisection
    initial_guess: 1.2
    bracket: [0.01, 20.0]
    tolerance_abs: 1e-12
    tolerance_rel: 1e-10
    max_iter: 400
branches:
  - name: subsonic
    condition: 1 - M
    preferred: false
  - name: supersonic
    condition: M - 1
    preferred: true
assumptions:
  - One-dimensional, steady, adiabatic, constant-area duct flow with wall friction.
  - Calorically perfect gas with constant gamma.
tests:
  units_policy: auto_convert_to_si
  relation_tolerance:
    abs: 1e-11
    rel: 1e-9
  cases:
    - id: m_0_5
      branch: subsonic
      full_state:
        gamma: 1.4
        M: 0.5
        v_vstar: 0.5345224838248488
      verify:
        residual_zero: true
        solve_targets:
          - target: v_vstar
            methods: [explicit]
          - target: M
            methods: [numerical]
    - id: m_2_0
      branch: supersonic
      full_state:
        gamma: 1.4
        M: 2.0
        v_vstar: 1.632993161855452
      verify:
        residual_zero: true
        solve_targets:
          - target: v_vstar
            methods: [explicit]
          - target: M
            methods: [numerical]
