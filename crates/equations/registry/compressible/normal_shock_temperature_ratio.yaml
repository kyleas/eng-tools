key: normal_shock_temperature_ratio
taxonomy:
  category: compressible
name: Normal Shock Temperature Ratio
source: "Anderson, Modern Compressible Flow: With Historical Perspective"
display:
  latex: '\frac{T_2}{T_1} = \frac{p_2/p_1}{\rho_2/\rho_1} = \left(1+\frac{2\gamma}{\gamma+1}(M_1^2-1)\right)\frac{(\gamma-1)M_1^2+2}{(\gamma+1)M_1^2}'
  unicode: "T2_T1 = (1 + (2*gamma/(gamma+1))*(M1^2-1)) * (((gamma-1)*M1^2 + 2)/((gamma+1)*M1^2))"
  ascii: "T2_T1 = (1 + (2*gamma/(gamma+1))*(M1^2-1)) * (((gamma-1)*M1^2 + 2)/((gamma+1)*M1^2))"
  description: Static temperature ratio across a normal shock.
variables:
  T2_T1:
    name: Static temperature ratio
    symbol: '\frac{T_2}{T_1}'
    dimension: ratio
    constraints:
      min: 1.0
  M1:
    name: Upstream Mach number
    symbol: 'M_1'
    dimension: mach
    constraints:
      min: 1.0
  gamma:
    name: Specific heat ratio
    symbol: '\gamma'
    dimension: dimensionless
    constraints:
      min: 1.01
residual: T2_T1 - ((1 + (2 * gamma / (gamma + 1)) * (M1^2 - 1)) * ((((gamma - 1) * M1^2) + 2) / ((gamma + 1) * M1^2)))
solve:
  explicit_forms:
    T2_T1: (1 + (2 * gamma / (gamma + 1)) * (M1^2 - 1)) * ((((gamma - 1) * M1^2) + 2) / ((gamma + 1) * M1^2))
  numerical:
    unsupported_targets: [gamma]
    solver: bisection
    initial_guess: 2.0
    bracket: [1.000001, 20.0]
    tolerance_abs: 1e-12
    tolerance_rel: 1e-10
    max_iter: 400
assumptions:
  - One-dimensional, steady, adiabatic normal shock.
  - Calorically perfect gas with constant gamma.
tests:
  units_policy: auto_convert_to_si
  relation_tolerance:
    abs: 1e-11
    rel: 1e-9
  cases:
    - id: m1_2
      full_state:
        M1: 2.0
        gamma: 1.4
        T2_T1: 1.6874999999999998
      verify:
        residual_zero: true
        solve_targets:
          - target: T2_T1
            methods: [explicit]
          - target: M1
            methods: [numerical]
