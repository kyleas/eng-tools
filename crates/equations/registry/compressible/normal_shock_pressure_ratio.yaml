key: normal_shock_pressure_ratio
taxonomy:
  category: compressible
name: Normal Shock Static Pressure Ratio
source: "Anderson, Modern Compressible Flow: With Historical Perspective"
display:
  latex: '\frac{p_2}{p_1} = 1 + \frac{2\gamma}{\gamma+1}(M_1^2-1)'
  unicode: "p2_p1 = 1 + (2*gamma/(gamma+1))*(M1^2 - 1)"
  ascii: "p2_p1 = 1 + (2*gamma/(gamma+1))*(M1^2 - 1)"
  description: Static pressure ratio across a normal shock.
variables:
  p2_p1:
    name: Static pressure ratio
    symbol: '\frac{p_2}{p_1}'
    dimension: ratio
    constraints:
      min: 1.0
  M1:
    name: Upstream Mach number
    symbol: 'M_1'
    dimension: mach
    constraints:
      min: 1.0
  gamma:
    name: Specific heat ratio
    symbol: '\gamma'
    dimension: dimensionless
    constraints:
      min: 1.01
residual: p2_p1 - (1 + (2 * gamma / (gamma + 1)) * (M1^2 - 1))
solve:
  explicit_forms:
    p2_p1: 1 + (2 * gamma / (gamma + 1)) * (M1^2 - 1)
  numerical:
    unsupported_targets: [gamma]
    solver: bisection
    initial_guess: 2.0
    bracket: [1.000001, 20.0]
    tolerance_abs: 1e-12
    tolerance_rel: 1e-10
    max_iter: 400
assumptions:
  - One-dimensional, steady, adiabatic normal shock.
  - Calorically perfect gas with constant gamma.
tests:
  units_policy: auto_convert_to_si
  relation_tolerance:
    abs: 1e-11
    rel: 1e-9
  cases:
    - id: m1_2
      full_state:
        M1: 2.0
        gamma: 1.4
        p2_p1: 4.5
      verify:
        residual_zero: true
        solve_targets:
          - target: p2_p1
            methods: [explicit]
          - target: M1
            methods: [numerical]
